<div class="label default-question-text-size" dir="auto">{{{LABEL}}}</div>

{{#MEDIAIMAGE}}
<img src="{{MEDIAIMAGE}}" />
{{/MEDIAIMAGE}}

{{#MEDIAAUDIO}}
<audio controls controlsList="nodownload">
  <source src="{{MEDIAAUDIO}}">
  Your browser does not support the audio element.
</audio>
{{/MEDIAAUDIO}}

{{#MEDIAVIDEO}}
<video width="100%" height="*" controls controlsList="nodownload">
  <source src="{{MEDIAVIDEO}}">
  Your browser does not support the video tag.
</video>
{{/MEDIAVIDEO}}

<div class="hint default-hint-text-size" dir="auto">{{{HINT}}}</div>

<div id="topText" class="top-text" dir="auto"></div>

<div class="image-choice-grid">
  <div class="image-choice-column">
    <div id="leftText" class="column-text" dir="auto"></div>
    <img id="leftImage" class="choice-image" alt="Option 1 image" />
    <button id="button1" onclick="addResult1()" class="button">Option 1</button>
  </div>

  <div class="image-choice-column">
    <div id="rightText" class="column-text" dir="auto"></div>
    <img id="rightImage" class="choice-image" alt="Option 2 image" />
    <button id="button2" onclick="addResult2()" class="button">Option 2</button>
  </div>
</div>

<div class="bypass-wrapper">
  <button id="byPassButton" onclick="pass()" class="span-button">None of the above</button>
</div>
